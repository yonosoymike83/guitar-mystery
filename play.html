<!DOCTYPE html>
<html lang="ca">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guitar Mystery Cache</title>

<link rel="stylesheet" href="styles.css">

<style>

.instructions{
    margin-bottom:20px;
}

#progress{
    margin-bottom:20px;
}

#fretboard{
    width:420px;
    margin:0 auto;
    display:grid;
    grid-template-columns:40px repeat(6,1fr);
    gap:3px;
}

.fret-number{
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    font-size:1rem;
}

.string-header{
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    font-size:1rem;
}

.note{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#6b4320;
    border:1px solid rgba(255,255,255,.15);
    cursor:pointer;
    transition:.2s;
    margin:auto;
}

.note:hover{
    transform:scale(1.05);
}

.correct{
    background:#28a745;
}

.wrong{
    background:#c0392b;
}

#coordinates{
    display:none;
    text-align:center;
    margin-top:30px;
}

.result-title{
    font-size:1.4rem;
    font-weight:bold;
    margin-bottom:12px;
}

.coords{
    font-size:1rem;
    margin-bottom:15px;
}

#copyButton{
    padding:8px 14px;
    font-size:.9rem;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#soundControls{

    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:15px;
    flex-wrap:wrap;

}

#soundControls button{

    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:.8rem;

}

#soundControls button.active{

    background:#28a745;
    color:white;

}
@media(max-width:700px){

    #fretboard{
        width:100%;
        max-width:360px;
    }

    .note{
        width:24px;
        height:24px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1 id="challengeTitle">
    Carregant...
</h1>

<div class="controls">

<button onclick="window.location='index.html'">
←
</button>

<button onclick="setLanguage('ca')">
CAT
</button>

<button onclick="setLanguage('es')">
ESP
</button>

<button onclick="setLanguage('en')">
ENG
</button>

</div>
<div id="soundControls">

    <button onclick="setSound('triangle')">
        🎵 Soft
    </button>

    <button onclick="setSound('sawtooth')">
        🎸 Guitar
    </button>

    <button onclick="setSound('square')">
        ⚡ Retro
    </button>

</div>
<div
    id="instructions"
    class="instructions">

    Carregant...

</div>

<div id="progress">

<span id="progressLabel">
Trobades
</span>

:

<span id="found">
0
</span>

/

<span id="total">
0
</span>

</div>

<div id="fretboard"></div>

<div id="coordinates">

<div class="result-title">

✅

<span id="resultText">
Repte resolt
</span>

</div>

<div
    class="coords"
    id="coordsText">

--

</div>

<button
    id="copyButton"
    onclick="copyCoords()">

📋 Copiar coordenades

</button>

</div>

</div>
<script src="app.js"></script>
</body>
</html>
