<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guitar Mystery Cache</title>

<link rel="stylesheet" href="styles.css">

<style>

.challenge-title{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.instructions{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

#progress{
    margin-bottom:20px;
    font-size:1.2rem;
}

#fretboard{
    background:#6b4320;
    border-radius:12px;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(13,1fr);
    gap:6px;
}

.note{
    width:48px;
    height:48px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.2);
    cursor:pointer;
}

.correct{
    background:#28a745;
}

.wrong{
    background:#c0392b;
}

#coordinates{
    display:none;
    background:#222;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
}

.back{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#222;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

```
<img
    src="guitar-mystery-logo.png"
    alt="Guitar Mystery Cache"
    class="logo"
>

<h1>Guitar Mystery Cache</h1>

<div class="challenge-title">
    Pentatónica menor de La
</div>

<div class="instructions">
    Encuentra todas las posiciones de la escala pentatónica menor de La en los primeros 12 trastes.
</div>

<div id="progress">
    Encontradas:
    <span id="found">0</span> /
    <span id="total">0</span>
</div>

<div id="fretboard"></div>

<div id="coordinates">

    <h2>
        📍 Coordenadas desbloqueadas
    </h2>

    <p>N 41° 42.357</p>
    <p>E 002° 47.812</p>

</div>

<a
    href="index.html"
    class="back">

    ← Volver

</a>
```

</div>

<script>

const tuning =
[
    "E",
    "A",
    "D",
    "G",
    "B",
    "E"
];

const notes =
[
    "C","C#","D","D#",
    "E","F","F#","G",
    "G#","A","A#","B"
];

const pentatonic =
[
    "A",
    "C",
    "D",
    "E",
    "G"
];

let found = 0;
let total = 0;

const fretboard =
    document.getElementById(
        "fretboard"
    );

function getNote(
    openString,
    fret
){

    const index =
        notes.indexOf(
            openString
        );

    return notes[
        (index + fret) % 12
    ];
}

for(let string=0; string<6; string++){

    for(let fret=0; fret<=12; fret++){

        const note =
            getNote(
                tuning[string],
                fret
            );

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "note";

        if(
            pentatonic.includes(
                note
            )
        ){
            total++;
        }

        div.addEventListener(
            "click",
            ()=>{

                if(
                    pentatonic.includes(
                        note
                    )
                ){

                    if(
                        !div.classList.contains(
                            "correct"
                        )
                    ){

                        div.classList.add(
                            "correct"
                        );

                        found++;

                        document
                        .getElementById(
                            "found"
                        )
                        .textContent =
                            found;

                        if(
                            found === total
                        ){

                            document
                            .getElementById(
                                "coordinates"
                            )
                            .style.display =
                                "block";
                        }

                    }

                }else{

                    div.classList.add(
                        "wrong"
                    );

                    setTimeout(()=>{

                        div.classList.remove(
                            "wrong"
                        );

                    },500);

                }

            }
        );

        fretboard.appendChild(
            div
        );
    }
}

document
.getElementById(
    "total"
)
.textContent =
    total;

</script>

</body>
</html>
