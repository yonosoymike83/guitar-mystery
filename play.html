<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Mystery Cache</title>
<link rel="stylesheet" href="styles.css">
<style>
.instructions { margin-bottom: 20px; }
#progress { margin-bottom: 20px; }

#fretboard-wrap {
  display:flex;
  justify-content:center;
  align-items:flex-start;

  width:100%;
}

#fret-labels {
  display: flex;
  flex-direction: column;
  padding: 6px 8px 6px 0;
  min-width: 36px;
  flex-shrink: 0;
}

.fret-label {
  color: #c8a46e;
  font-size: 0.7rem;
  font-weight: bold;
  text-shadow: 0 1px 2px rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  height: 44px;
}

.fret-label:first-child {
  height: 30px;
}

#fretboard {
  display: grid;
  grid-template-columns: repeat(6, 44px);
  gap: 0;
  row-gap: 0;
  background: linear-gradient(
    to right,
    #2c1505 0%, #5a2e0e 8%, #3d1a06 20%,
    #6b3a12 35%, #3a1804 50%,
    #6b3a12 65%, #3d1a06 80%,
    #5a2e0e 92%, #2c1505 100%
  );
  border-radius: 6px;
  padding: 6px 4px;
  box-shadow:
    0 0 0 4px #8b5e2a,
    0 0 0 7px #4a2e0d,
    0 10px 30px rgba(0,0,0,0.8);
}

.string-header {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #e8c97a;
  font-weight: bold;
  font-size: 0.85rem;
  text-shadow: 0 0 8px rgba(232,201,122,0.4);
  padding-bottom: 5px;
  border-bottom: 2px solid rgba(200,160,80,0.2);
}

.note {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
  margin: 4px auto;
  position: relative;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

.note::before {
  content: '';
  position: absolute;
  top: 50%;
  left: -55%;
  right: -55%;
  height: 2px;
  background: linear-gradient(
    to right,
    transparent, #909090 15%, #d8d8d8 50%, #909090 85%, transparent
  );
  transform: translateY(-50%);
  pointer-events: none;
  z-index: 0;
}

.note::after {
  content: '';
  position: absolute;
  left: 50%;
  top: -6px;
  bottom: -6px;
  width: 2px;
  background: linear-gradient(
    to bottom,
    transparent, #b0a060 20%, #ddd090 50%, #b0a060 80%, transparent
  );
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 0;
}

.note.first-in-row::before {
  left: 0;
}

.note:hover {
  transform: scale(1.18);
  background: radial-gradient(circle at 35% 30%, #c8a46e, #7a4a20);
  box-shadow:
    inset 0 1px 3px rgba(255,255,255,0.3),
    0 0 12px rgba(255,200,80,0.4),
    0 2px 6px rgba(0,0,0,0.6);
  z-index: 2;
}

.correct {
  background: radial-gradient(circle at 35% 30%, #5de87a, #1a7a35) !important;
  box-shadow:
    inset 0 1px 3px rgba(255,255,255,0.3),
    0 0 14px rgba(40,167,69,0.7),
    0 2px 6px rgba(0,0,0,0.5) !important;
  z-index: 2;
}

.wrong {
  background: radial-gradient(circle at 35% 30%, #e06060, #8b1a1a) !important;
  box-shadow:
    inset 0 1px 3px rgba(255,255,255,0.2),
    0 0 14px rgba(192,57,43,0.7),
    0 2px 6px rgba(0,0,0,0.5) !important;
  z-index: 2;
}

#coordinates {
  display: none;
  text-align: center;
  margin-top: 30px;
}
.result-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 12px; }
.coords { font-size: 1rem; margin-bottom: 15px; }

#copyButton {
  padding: 8px 14px;
  font-size: 0.9rem;
  border: 1px solid #8b5e2a !important;
  border-radius: 8px;
  cursor: pointer;
  background: #5a3510 !important;
  color: #e8c97a !important;
  font-weight: normal !important;
  transition: background 0.2s;
}
#copyButton:hover { background: #7a4a1a !important; }

#soundControls {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

button.sound-btn,
div#soundControls button.sound-btn {
  padding: 6px 12px !important;
  border: 1px solid #6b4320 !important;
  border-radius: 8px !important;
  font-size: 0.8rem !important;
  font-weight: normal !important;
  background: #3d2208 !important;
  color: #e8c97a !important;
  cursor: pointer !important;
  transition: background 0.2s, transform 0.1s !important;
  margin: 0 !important;
}
button.sound-btn:hover,
div#soundControls button.sound-btn:hover {
  background: #5a3510 !important;
  transform: translateY(-1px) !important;
}
button.sound-btn.active,
div#soundControls button.sound-btn.active {
  background: #28a745 !important;
  color: white !important;
  border-color: #1e7e34 !important;
}

@media (max-width: 700px) {
  #fretboard { width: 100%; max-width: 320px; }
  .note { width: 24px; height: 24px; }
  .note::after { top: -4px; bottom: -4px; }
}
</style>
</head>
<body>
<div class="container">
<h1 id="challengeTitle">Carregant...</h1>
<div class="controls">
  <button onclick="window.location='index.html'">←</button>
  <button onclick="setLanguage('ca')">CAT</button>
  <button onclick="setLanguage('es')">ESP</button>
  <button onclick="setLanguage('en')">ENG</button>
</div>
<div id="soundControls">
  <button class="sound-btn" onclick="setSound('triangle')">🎵 Soft</button>
  <button class="sound-btn" onclick="setSound('sawtooth')">🎸 Guitar</button>
  <button class="sound-btn" onclick="setSound('square')">⚡ Retro</button>
</div>
<div id="instructions" class="instructions">Carregant...</div>
<div id="progress">
  <span id="progressLabel">Trobades</span> :
  <span id="found">0</span> /
  <span id="total">0</span>
</div>
<div style="text-align: center;">
  <div id="fretboard-wrap">
    <div id="fret-labels"></div>
    <div id="fretboard"></div>
  </div>
</div>
<div id="coordinates">
  <div class="result-title">✅ <span id="resultText">Repte resolt</span></div>
  <div class="coords" id="coordsText">--</div>
  <button id="copyButton" onclick="copyCoords()">📋 Copiar coordenades</button>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
