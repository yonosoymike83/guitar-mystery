<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guitar Mystery Cache</title>

<link rel="stylesheet" href="styles.css">

<style>

.controls{
    margin-bottom:20px;
}

.controls button{
    margin:0 4px;
    padding:8px 16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.instructions{
    margin-bottom:20px;
    font-size:1.2rem;
}

#progress{
    margin-bottom:20px;
    font-size:1.2rem;
}

#fretboard{
    width:600px;
    margin:0 auto;
    background:#6b4320;
    border-radius:10px;
    padding:15px;
    display:grid;
    grid-template-columns:repeat(13,1fr);
    gap:4px;
}

.note{
    width:40px;
    height:40px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.15);
    cursor:pointer;
}

.correct{
    background:#28a745;
}

.wrong{
    background:#c0392b;
}

#coordinates{
    display:none;
    margin-top:20px;
    background:#222;
    border-radius:10px;
    padding:20px;
}

@media(max-width:700px){

    #fretboard{
        width:95%;
        gap:2px;
    }

    .note{
        width:28px;
        height:28px;
    }
}

</style>

</head>

<body>

<div class="container">

```
<h1 id="challengeTitle">
    Pentatónica menor de La
</h1>

<div class="controls">

    <button onclick="window.location='index.html'">
        ←
    </button>

    <button onclick="setLanguage('ca')">
        CAT
    </button>

    <button onclick="setLanguage('es')">
        ESP
    </button>

    <button onclick="setLanguage('en')">
        ENG
    </button>

</div>

<div id="instructions" class="instructions">
    Encuentra todas las posiciones de la escala pentatónica menor de La en los primeros 12 trastes.
</div>

<div id="progress">
    Encontradas:
    <span id="found">0</span> /
    <span id="total">0</span>
</div>

<div id="fretboard"></div>

<div id="coordinates">

    <h2>
        📍 Coordenadas desbloqueadas
    </h2>

    <p>
        N 41° 42.357
    </p>

    <p>
        E 002° 47.812
    </p>

</div>
```

</div>

<script>

let language =
    localStorage.getItem("language")
    || "es";

function setLanguage(lang){

    localStorage.setItem(
        "language",
        lang
    );

    location.reload();
}

const texts = {

    ca:{
        title:"Pentatònica menor de La",
        instructions:"Troba totes les posicions de la pentatònica menor de La en els primers 12 trasts."
    },

    es:{
        title:"Pentatónica menor de La",
        instructions:"Encuentra todas las posiciones de la escala pentatónica menor de La en los primeros 12 trastes."
    },

    en:{
        title:"A Minor Pentatonic",
        instructions:"Find all positions of the A minor pentatonic scale within the first 12 frets."
    }

};

document.getElementById(
    "challengeTitle"
).textContent =
    texts[language].title;

document.getElementById(
    "instructions"
).textContent =
    texts[language].instructions;

const tuning =
[
    "E",
    "A",
    "D",
    "G",
    "B",
    "E"
];

const notes =
[
    "C","C#","D","D#",
    "E","F","F#","G",
    "G#","A","A#","B"
];

const pentatonic =
[
    "A",
    "C",
    "D",
    "E",
    "G"
];

let found = 0;
let total = 0;

const fretboard =
    document.getElementById(
        "fretboard"
    );

function getNote(openString,fret){

    const index =
        notes.indexOf(openString);

    return notes[
        (index + fret) % 12
    ];
}

for(let string=0; string<6; string++){

    for(let fret=0; fret<=12; fret++){

        const note =
            getNote(
                tuning[string],
                fret
            );

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "note";

        if(
            pentatonic.includes(note)
        ){
            total++;
        }

        div.addEventListener(
            "click",
            ()=>{

                if(
                    pentatonic.includes(note)
                ){

                    if(
                        !div.classList.contains(
                            "correct"
                        )
                    ){

                        div.classList.add(
                            "correct"
                        );

                        found++;

                        document
                        .getElementById(
                            "found"
                        )
                        .textContent =
                            found;

                        if(
                            found === total
                        ){

                            document
                            .getElementById(
                                "coordinates"
                            )
                            .style.display =
                                "block";
                        }
                    }

                }else{

                    div.classList.add(
                        "wrong"
                    );

                    setTimeout(()=>{

                        div.classList.remove(
                            "wrong"
                        );

                    },500);
                }

            }
        );

        fretboard.appendChild(div);

    }

}

document
.getElementById(
    "total"
)
.textContent =
    total;

</script>

</body>
</html>
