<!DOCTYPE html>
<html lang="ca">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guitar Mystery Cache</title>

<link rel="stylesheet" href="styles.css">

<style>

.instructions{
    margin-bottom:20px;
}

#progress{
    margin-bottom:20px;
}

#fretboard{
    width:320px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:3px;
}

.note{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#6b4320;
    border:1px solid rgba(255,255,255,.15);
    cursor:pointer;
    transition:.2s;
}

.note:hover{
    transform:scale(1.05);
}

.correct{
    background:#28a745;
}

.wrong{
    background:#c0392b;
}

#coordinates{
    display:none;
    margin-top:40px;
    text-align:center;
}

.result-title{
    font-size:0.9rem;
    font-weight:bold;
    margin-bottom:10px;
}

.coords{
    font-size:0.85rem;
    margin-bottom:15px;
}

#copyButton{
    padding:8px 14px;
    font-size:0.9rem;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

@media(max-width:700px){

    #fretboard{
        width:270px;
    }

    .note{
        width:34px;
        height:34px;
    }
}

</style>

</head>

<body>

<div class="container">

<h1 id="challengeTitle">
    Pentatònica menor de La
</h1>

<div class="controls">

    <button onclick="window.location='index.html'">
        ←
    </button>

    <button onclick="setLanguage('ca')">
        CAT
    </button>

    <button onclick="setLanguage('es')">
        ESP
    </button>

    <button onclick="setLanguage('en')">
        ENG
    </button>

</div>

<div id="instructions" class="instructions">
    Troba totes les posicions de la pentatònica menor de La en els primers 12 trasts.
</div>

<div id="progress">

    <span id="progressLabel">
        Trobades
    </span>:

    <span id="found">0</span> /

    <span id="total">0</span>

</div>

<div id="fretboard"></div>

<div id="coordinates">

    <div class="result-title">
        <span class="success-icon">✅</span>
        <span id="resultText">
            Repte resolt
        </span>
    </div>

    <div
        class="coords"
        id="coordsText">

        N 41° 42.357 E 002° 47.812

    </div>

    <button
        id="copyButton"
        onclick="copyCoords()">

        📋 Copiar coordenades

    </button>

</div>

</div>

<script>

let language =
    localStorage.getItem("language")
    || "ca";

function setLanguage(lang){

    localStorage.setItem(
        "language",
        lang
    );

    location.reload();
}

const texts = {

    ca:{
        title:"Pentatònica menor de La",
        instructions:"Troba totes les posicions de la pentatònica menor de La en els primers 12 trasts.",
        progress:"Trobades"
    },

    es:{
        title:"Pentatónica menor de La",
        instructions:"Encuentra todas las posiciones de la escala pentatónica menor de La en los primeros 12 trastes.",
        progress:"Encontradas"
    },

    en:{
        title:"A Minor Pentatonic",
        instructions:"Find all positions of the A minor pentatonic scale within the first 12 frets.",
        progress:"Found"
    }

};

const resultTexts = {

    ca:"Repte resolt",

    es:"Reto resuelto",

    en:"Challenge solved"

};

const copyTexts = {

    ca:"📋 Copiar coordenades",

    es:"📋 Copiar coordenadas",

    en:"📋 Copy coordinates"

};

document.getElementById("challengeTitle").textContent =
    texts[language].title;

document.getElementById("instructions").textContent =
    texts[language].instructions;

document.getElementById("progressLabel").textContent =
    texts[language].progress;

document.getElementById("resultText").textContent =
    resultTexts[language];

document.getElementById("copyButton").textContent =
    copyTexts[language];
    const tuning =
[
    "E",
    "A",
    "D",
    "G",
    "B",
    "E"
];

const notes =
[
    "C","C#","D","D#",
    "E","F","F#","G",
    "G#","A","A#","B"
];

const pentatonic =
[
    "A",

];

let found = 0;
let total = 0;

const fretboard =
    document.getElementById(
        "fretboard"
    );

function getNote(openString,fret){

    const index =
        notes.indexOf(openString);

    return notes[
        (index + fret) % 12
    ];
}

for(let fret=0; fret<=12; fret++){

    for(let string=0; string<6; string++){

        const note =
            getNote(
                tuning[string],
                fret
            );

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "note";

        if(
            pentatonic.includes(
                note
            )
        ){
            total++;
        }

        div.addEventListener(
            "click",
            ()=>{

                if(
                    pentatonic.includes(
                        note
                    )
                ){

                    if(
                        !div.classList.contains(
                            "correct"
                        )
                    ){

                        div.classList.add(
                            "correct"
                        );

                        found++;

                        document
                        .getElementById(
                            "found"
                        )
                        .textContent =
                            found;

                        if(
                            found === total
                        ){

                            document
                            .getElementById(
                                "coordinates"
                            )
                            .style.display =
                                "block";
                        }

                    }

                }else{

                    div.classList.add(
                        "wrong"
                    );

                    setTimeout(()=>{

                        div.classList.remove(
                            "wrong"
                        );

                    },500);

                }

            }
        );

        fretboard.appendChild(
            div
        );

    }

}

document.getElementById(
    "total"
).textContent =
    total;

function copyCoords(){

    navigator.clipboard.writeText(
        document.getElementById(
            "coordsText"
        ).textContent.trim()
    );

    const btn =
        document.getElementById(
            "copyButton"
        );

    btn.textContent =
        "📋 ✓";

    setTimeout(()=>{

        btn.textContent =
            copyTexts[language];

    },2000);

}

</script>

</body>
</html>
